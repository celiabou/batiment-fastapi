{% extends "base.html" %}
{% block title %}Administration | Connexion{% endblock %}

{% block content %}
<section class="section auth-shell">
  <div class="auth-card admin-login-card">
    <p class="kicker">Administration</p>
    <h1>Connexion admin</h1>
    <p class="lead">Accédez au tableau de bord d'administration.</p>
    {% if error %}
      <div class="form-alert">{{ error }}</div>
    {% endif %}
    <form class="auth-form" method="post" action="/admin/login">
      <label>
        Email
        <input type="email" name="email" required autocomplete="email">
      </label>
      <label>
        Mot de passe
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button class="btn btn-solid" type="submit">Se connecter</button>
    </form>
  </div>
</section>
{% endblock %}
