{% extends "base.html" %}
{% block content %}
<section class="page-hero">
  <p class="kicker">Contact</p>
  <h1>Contact</h1>
  <p class="lead">Ce formulaire est reserve aux autres sujets. Pour un devis, utilisez l’onglet Estimation du projet.</p>
</section>

<section class="section section-shell">
  <form class="form pro-form" method="post" action="/api/lead">
    <input type="hidden" name="visitor_id" id="contactVisitorId">
    <input type="hidden" name="visitor_landing" id="contactVisitorLanding">
    <input type="hidden" name="visitor_referrer" id="contactVisitorReferrer">
    <input type="hidden" name="visitor_utm" id="contactVisitorUtm">
    <label>Nom
      <input name="name" placeholder="Prenom Nom" required>
    </label>
    <label>Telephone
      <input name="phone" placeholder="06 12 34 56 78" required>
    </label>
    <label>Email
      <input type="email" name="email" placeholder="vous@email.fr" required>
    </label>
    <label>Message
      <textarea name="message" rows="5" placeholder="Votre sujet, besoin ou question..."></textarea>
    </label>
    <button class="btn btn-solid" type="submit">Envoyer le message</button>
  </form>
</section>

<script>
  (function () {
    if (!window.RB_TRACKING || typeof window.RB_TRACKING.getContext !== "function") return;
    const ctx = window.RB_TRACKING.getContext() || {};
    const visitorIdEl = document.getElementById("contactVisitorId");
    const landingEl = document.getElementById("contactVisitorLanding");
    const referrerEl = document.getElementById("contactVisitorReferrer");
    const utmEl = document.getElementById("contactVisitorUtm");
    if (visitorIdEl) visitorIdEl.value = ctx.visitor_id || "";
    if (landingEl) landingEl.value = ctx.visitor_landing || "";
    if (referrerEl) referrerEl.value = ctx.visitor_referrer || "";
    if (utmEl) utmEl.value = JSON.stringify(ctx.visitor_utm || {});
  })();
</script>
{% endblock %}
