{% extends "base.html" %}
{% block title %}Mes documents | Espace client{% endblock %}

{% block content %}
<section class="dashboard-shell full-bleed docs-only">
  <div class="wrap">
    <section class="dashboard-section">
      <div class="doc-card">
        {% if current_docs %}
          <div class="doc-row-list">
            {% for doc in current_docs %}
              <div class="doc-row-line">
                <span class="doc-row-label">{{ doc.label or doc.name }}</span>
                <a class="doc-row-link" href="{{ doc.url }}" target="_blank" rel="noopener">{{ doc.name }}</a>
              </div>
            {% endfor %}
          </div>
        {% else %}
          <p class="muted">Aucun document pour le moment.</p>
        {% endif %}
      </div>
    </section>
  </div>
</section>
{% endblock %}
