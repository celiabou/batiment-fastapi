{% extends "base.html" %}
{% block title %}Mes documents | Espace client{% endblock %}

{% block content %}
<section class="dashboard-shell full-bleed docs-only">
  <div class="wrap">
    <section class="dashboard-section">
      <div class="doc-card">
        <p class="doc-card-title">Documents</p>
        {% if docs_flat %}
          <ul class="doc-simple-list">
            {% for doc in docs_flat %}
              <li>
                <a class="doc-simple-link" href="{{ doc.url }}" target="_blank" rel="noopener">{{ doc.name }}</a>
              </li>
            {% endfor %}
          </ul>
        {% else %}
          <p class="muted">Aucun document pour le moment.</p>
        {% endif %}
      </div>
    </section>
  </div>
</section>
{% endblock %}
