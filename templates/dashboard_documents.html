{% extends "base.html" %}
{% block title %}Mes documents | Espace client{% endblock %}

{% block content %}
<section class="dashboard-shell full-bleed docs-only">
  <div class="wrap">
    <section class="dashboard-section">
      <div class="doc-card">
        <p class="doc-card-title">Documents</p>
        {% if current_docs %}
          <div class="doc-file-list">
            {% for doc in current_docs %}
              <a href="{{ doc.url }}" target="_blank" rel="noopener">{{ doc.name }}</a>
            {% endfor %}
          </div>
        {% else %}
          <p class="muted">Aucun document pour le moment.</p>
        {% endif %}
      </div>
    </section>
  </div>
</section>
{% endblock %}
