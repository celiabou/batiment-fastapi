{% extends "base.html" %}
{% block title %}Reinitialiser le mot de passe{% endblock %}

{% block content %}
<section class="section auth-shell">
  <div class="auth-card">
    <p class="kicker">Espace client</p>
    <h1>Nouveau mot de passe</h1>
    <p class="lead">Choisissez un nouveau mot de passe pour votre compte.</p>
    {% if error %}
      <div class="form-alert">{{ error }}</div>
    {% endif %}
    <form class="auth-form" method="post" action="/password-reset/{{ token }}">
      <label>
        Nouveau mot de passe
        <input type="password" name="password" required autocomplete="new-password">
      </label>
      <button class="btn btn-solid" type="submit">Mettre a jour</button>
    </form>
  </div>
</section>
{% endblock %}
