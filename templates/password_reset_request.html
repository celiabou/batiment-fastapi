{% extends "base.html" %}
{% block title %}Mot de passe oublie{% endblock %}

{% block content %}
<section class="section auth-shell">
  <div class="auth-card">
    <p class="kicker">Espace client</p>
    <h1>Mot de passe oublie</h1>
    <p class="lead">Entrez votre email pour recevoir un lien de reinitialisation.</p>
    {% if error %}
      <div class="form-alert">{{ error }}</div>
    {% endif %}
    <form class="auth-form" method="post" action="/password-reset">
      <label>
        Email
        <input type="email" name="email" required autocomplete="email">
      </label>
      <button class="btn btn-solid" type="submit">Envoyer le lien</button>
    </form>
  </div>
</section>
{% endblock %}
